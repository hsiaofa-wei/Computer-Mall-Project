<div class="container">
    <div class="col-md-offset-1 col-md-10">
        <div class="panel panel-primary">
            <div class="panel-heading">
                <p class="panel-title"><span class="fa fa-shopping-cart"></span> 购物车</p>
            </div>
            <div class="panel-body">
                <form action="orderConfirm.html" role="form">
                    <!--购物车表格开始-->
                    <table class="cart-table" width="100%">
                        <thead>
                        <tr>
                            <th width="8%">
                                <input id="selectAll" type="checkbox" class="ckall" onclick="checkall()"/>&nbsp;全选
                            </th>
                            <th width="110"></th>
                            <th width="29%">商品</th>
                            <th width="11%">单价</th>
                            <th width="15%">数量</th>
                            <th width="11%">金额</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody id="cart-list" class="cart-body">
                        </tbody>
                    </table>
                    <div class="total-bar">
                        <a onclick="delCheckedGoods()" class="cart-del-sel btn btn-default btn-xs">删除所选商品</a>
                        <span class="pull-right">已选商品
                                <span id="selectCount">0</span>件 总价¥
                                <span id="selectTotal">0</span>元
                                </span>
                    </div>
                    <div>
                                <span class="pull-right">
                                <input type="submit" value="  结  算  " class="btn btn-primary btn-lg link-account"/>
                            </span>
                    </div>
<script type="text/javascript">
    // $(function() {
    // 	//返回链接
    // 	$(".link-account").click(function() {
    // 		location.href = "orderConfirm.html";
    // 	})
    // })

    $(function () {
        showCartList();
        // 监听复选框状态变化
        $("#cart-list").on("change", "input[name=cids]", updateTotal);
    });

    // 全选复选框点击事件
    $("#selectAll").click(function () {
        $("input[name=cids]").prop("checked", this.checked);
        updateTotal();
    });

    function showCartList() {
        $("#cart-list").empty();
        $.ajax({
            url: "/shopcar",
            type: "GET",
            dataType: "JSON",
            success: function (json) {
                let list = json.data;
                for (let i = 0; i < list.length; i++) {
                    let tr = '<tr>'
                        + '<td>'
                        + '<input name="cids" value="#{cid}" type="checkbox" class="ckitem" />'
                        + '</td>'
                        + '<td><img src="..#{image}collect.png" class="img-responsive" /></td>'
                        + '<td>#{title}#{msg}</td>'
                        + '<td>¥<span id="price-#{cid}">#{realPrice}</span></td>'
                        + '<td>'
                        + '<input id="price-#{cid}" type="button" value="-" class="num-btn" onclick="reduceNum(#{cid})" />'
                        + '<input id="goodsCount#{cid}" type="text" size="2" readonly="readonly" class="num-text" value="#{num}">'
                        + '<input id="price+#{cid}" class="num-btn" type="button" value="+" onclick="addNum(#{cid})" />'
                        + '</td>'
                        + '<td>¥<span id="total-price-#{cid}">#{totalPrice}</span></td>'
                        + '<td>'
                        + '<input type="button" onclick="delCartItem(#{cid})" class="cart-del btn btn-default btn-xs" value="删除" />'
                        + '</td>'
                        + '</tr>';
                    tr = tr.replaceAll(/#{cid}/g, list[i].cid);
                    tr = tr.replace(/#{title}/g, list[i].title);
                    tr = tr.replace(/#{image}/g, list[i].image);
                    tr = tr.replace(/#{realPrice}/g, list[i].realPrice);
                    tr = tr.replace(/#{num}/g, list[i].num);
                    tr = tr.replace(/#{totalPrice}/g, list[i].realPrice * list[i].num);

                    if (list[i].realPrice < list[i].price) {
                        tr = tr.replace(/#{msg}/g, "比加入时降价" + (list[i].price - list[i].realPrice) + "元");
                    } else {
                        tr = tr.replace(/#{msg}/g, "");
                    }
                    $("#cart-list").append(tr);
                }
                updateTotal();
            }
        });
    }

    // 更新已选商品数量和总价的函数
    function updateTotal() {
        let selectedCount = 0;
        let selectedTotal = 0;
        $("input[name=cids]:checked").each(function() {
            let cid = $(this).val();
            // 获取商品数量
            let quantity = parseInt($("#goodsCount" + cid).val());
            selectedCount += quantity;
            let totalPrice = parseFloat($("#total-price-" + cid).text());
            selectedTotal += totalPrice;
        });
        // 更新购物车页面的统计信息
        $("#selectCount").text(selectedCount);
        $("#selectTotal").text(selectedTotal.toFixed(2));
        // 更新订单确认页面的统计信息（假设存在该元素）
        $("#all-count").text(selectedCount);
        $("#all-price").text(selectedTotal.toFixed(2));
    }

    function addNum(cid) {
        $.ajax({
            url: "/shopcar/" + cid + "/addnum",
            type: "POST",
            dataType: "JSON",
            success: function (json) {
                if (json.state == 200) {
                    // 将goodsCount中的商品数量替换成controller层传过来的数据
                    $("#goodsCount" + cid).val(json.data);
                    // 拿到商品单价
                    let price = $("#price-" + cid).html();
                    // 计算总价
                    let totalPrice = price * json.data;
                    // 将计算出来的总价替换到原来的总价上
                    $("#total-price-" + cid).html(totalPrice);
                    updateTotal(); // 更新总价和数量
                } else {
                    alert("增加商品数量失败！" + json.message);
                }
            },
            error: function (xhr) {
                alert("您的登录信息已经过期，请重新登录！HTTP响应码：" + xhr.status);
                location.href = "login.html";
            }
        });
    }

    function reduceNum(cid) {
        $.ajax({
            url: "/shopcar/" + cid + "/reducenum",
            type: "POST",
            dataType: "JSON",
            success: function (json) {
                if (json.state == 200) {
                    // 将goodsCount中的商品数量替换成controller层传过来的数据
                    $("#goodsCount" + cid).val(json.data);
                    // 拿到商品单价
                    let price = $("#price-" + cid).html();
                    // 计算总价
                    let totalPrice = price * json.data;
                    // 将计算出来的总价替换到原来的总价上
                    $("#total-price-" + cid).html(totalPrice);
                    updateTotal(); // 更新总价和数量
                } else {
                    alert("减少商品数量失败！" + json.message);
                }
            },
            error: function (xhr) {
                alert("您的登录信息已经过期，请重新登录！HTTP响应码：" + xhr.status);
                location.href = "login.html";
            }
        });
    }

    function delCartItem(cid) {
        $.ajax({
            url: "/shopcar/" + cid + "/delete",
            type: "POST",
            dataType: "JSON",
            success: function (data) {
                if (data.state == 200) {
                    alert("删除成功");
                    showCartList();
                } else {
                    alert("删除失败");
                }
            },
            error: function (xhr) {
                alert("您的登录信息已经过期，请重新登录！HTTP响应码：" + xhr.status);
                location.href = "login.html";
            }
        })
    }

    function delCheckedGoods() {
        var arr = new Array();
        var check = document.getElementsByClassName("ckitem");
        for (var i = 0; i < check.length; i++) {
            if (check[i].checked) {
                arr.push(check[i].value);
            }
        }
        $.ajax({
            url: "/shopcar/deletegoods?cids=" + arr,
            type: "get",
            dataType: "JSON",
            success: function (data) {
                if (data.state == 200) {
                    alert("删除成功");
                    showCartList();
                } else {
                    alert("删除失败");
                }
            },
            error: function (xhr) {
                alert("您的登录信息已经过期，请重新登录！HTTP响应码：" + xhr.status);
                location.href = "login.html";
            }
        })
    }

</script>
</body>
