spring:
  datasource:
    url: jdbc:mysql://localhost:3306/store_shopping?serverTimezone=UTC&character=utf-8
    username: root
    password: 20040508
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB #上传单个文件的大小上限
      max-request-size: 15MB #整个http请求数据大最大值
mybatis:
  mapper-locations: classpath:mapper/*.xml #表示在类路径下的mapper目录中查找所有 XML 映射文件。
  configuration:
    map-underscore-to-camel-case: true #开启驼峰命名法映射。这意味着数据库表中的字段名（如user_name）会自动映射到 Java 对象的属性名（如userName）。
user:
  address:
    max-count: 20 #设置用户最多可以拥有的地址数量为 20 个